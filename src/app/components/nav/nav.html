<header class="nav" [class.scrolled]="scrolled()" [class.open]="menuOpen()">
  <div class="nav-inner">
    <a class="brand" href="#top" (click)="closeMenu()" aria-label="Home">
      <span class="brand-mark" aria-hidden="true">{{ profile.initials }}</span>
      <span class="brand-name">Christian Jay</span>
    </a>

    <nav class="nav-links" aria-label="Primary">
      @for (link of links; track link.id) {
        <a [href]="'#' + link.id" (click)="closeMenu()">{{ link.label }}</a>
      }
    </nav>

    <div class="nav-actions">
      <a
        class="resume-btn"
        [href]="profile.resumeFile"
        [attr.download]="profile.resumeDownloadName"
        aria-label="Download resume PDF"
        (click)="closeMenu()"
      >
        <span>Resume</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </a>

      <button
        type="button"
        class="menu-toggle"
        [attr.aria-expanded]="menuOpen()"
        aria-label="Toggle navigation"
        (click)="toggleMenu()"
      >
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <div class="mobile-panel" [attr.hidden]="!menuOpen() ? '' : null">
    @for (link of links; track link.id) {
      <a [href]="'#' + link.id" (click)="closeMenu()">{{ link.label }}</a>
    }
    <a
      class="resume-btn mobile"
      [href]="profile.resumeFile"
      [attr.download]="profile.resumeDownloadName"
      (click)="closeMenu()"
    >
      Download Resume
    </a>
  </div>
</header>
